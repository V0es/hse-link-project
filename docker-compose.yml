services:
  api:
    build: .
    container_name: api_service
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000
  postgres:
    image: postgres:latest
    container_name: postgres_db
    environment:
      POSTGRES_USER: ${DATABASE__USER}
      POSTGRES_PASSWORD: ${DATABASE__PASSWORD}
      POSTGRES_DB: ${DATABASE__NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/

  redis:
    image: redis:latest
    container_name: redis_cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  worker:
    build: .
    container_name: celery_worker
    env_file:
      - .env
    depends_on:
      - redis
    command: uv run celery -A app.core.celery_app.celery_app worker --loglevel=info

  beat:
    build: .
    container_name: celery_beat
    env_file:
      - .env
    depends_on:
      - redis
    command: uv run celery -A app.core.celery_app.celery_app beat --loglevel=info
  
volumes:
  postgres_data:
  redis_data: